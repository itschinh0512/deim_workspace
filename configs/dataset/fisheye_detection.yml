task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 1
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/vdlung/nas/vdlung/LocTH/omni2rect_DEIM/dataset_fisheye/images/train
    ann_file: /home/vdlung/nas/vdlung/LocTH/omni2rect_DEIM/dataset_fisheye/annotations/instances_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/vdlung/nas/vdlung/LocTH/omni2rect_DEIM/dataset_fisheye/images/val
    ann_file: /home/vdlung/nas/vdlung/LocTH/omni2rect_DEIM/dataset_fisheye/annotations/instances_val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
